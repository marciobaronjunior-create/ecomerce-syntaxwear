<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - Tênis e Sneakers Online</title>

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./base.css" />
    <link rel="stylesheet" href="./layout.css" />
    <link rel="stylesheet" href="./css/components/header.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/components/hero.css" />

</head>

<body>
    <header class="header">

        <h1 class="logo">
            <a href="/">
                <img src="./images/logo/logo.svg" alt="SyntaxWear - Tênis e Sneakers Online.">
            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>

        <nav class="nav-rigth" aria-label="Menu Secundário">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#"><img src="./images/icons/user.svg" alt="Perfil"></a></li>
                <li><a href="#"><img src="./images/icons/help.svg" alt="Ajuda"></a></li>
                <li><a href="#"><img src="images/icons/bag.svg" alt="Carrinho"></a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section id="hero" class="hero-section">
            <div class="hero-overlay">
                <div class="container hero-content">
                    <span class="hero-subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">comprar</a>
                    </div>
                </div>
            </div>
        </section>

        <section id="categories" class="categories-section">
            <div class="container categories-container">
                <!-- Categorias de tênis -->
            </div>
        </section>

        <section id="products" class="products-section">
            <div class="container products-container">
                <!-- Grid com produtos em destaque -->
            </div>
        </section>
    </main>

    <footer id="contact" class="site-footer footer">
        <div class="container footer-container">
            <!-- Informações de contato e links -->
        </div>
    </footer>
</body>

</html>
