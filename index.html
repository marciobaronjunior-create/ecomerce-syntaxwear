<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - Ecommerce</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./base.css">
    <link rel="stylesheet" href="./layout.css">

</head>
<body>
    <header class="site-header header">
        <div class="container header-container">
            <a href="#" class="logo">Syntaxwear</a>
            <nav class="site-nav main-nav" aria-label="Navegação principal">
                <ul class="nav-list">
                    <li class="nav-item"><a href="#hero" class="nav-link">Início</a></li>
                    <li class="nav-item"><a href="#categories" class="nav-link">Categorias</a></li>
                    <li class="nav-item"><a href="#products" class="nav-link">Produtos</a></li>
                    <li class="nav-item"><a href="#contact" class="nav-link">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section id="hero" class="hero-section">
            <div class="container hero-container">
                <!-- Conteúdo do hero -->
            </div>
        </section>

        <section id="categories" class="categories-section">
            <div class="container categories-container">
                <!-- Categorias de tênis -->
            </div>
        </section>

        <section id="products" class="products-section">
            <div class="container products-container">
                <!-- Grid com produtos em destaque -->
            </div>
        </section>
    </main>

    <footer id="contact" class="site-footer footer">
        <div class="container footer-container">
            <!-- Informações de contato e links -->
        </div>
    </footer>
</body>
</html>
